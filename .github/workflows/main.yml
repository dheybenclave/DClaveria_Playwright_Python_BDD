name: Playwright Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      run_parallel:
        description: 'Run test in parallel? (Ignored for marked sequential stages)'
        required: true
        type: boolean
        default: false
      test_filter:
        description: 'Run specific test (e.g., -m "smoke")'
        required: false
        default: ''
      record_video:
        description: 'Record videos?'
        type: boolean
        default: false

env:
  # FIX: Opt into Node 24 now to clear deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RECORD_VIDEO: ${{ inputs.record_video || 'false' }}
  TEST_CREDENTIALS_JSON: ${{ secrets.LIST_OF_CREDENTIALS }}
  BASE_URL: https://automationexercise.com

jobs:
  automation-suite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.4'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      # STAGE 1: Registration/Setup (Must run alone to generate state)
      - name: Run Stage 1 - Signup
        run: |
          mkdir -p test-results/test_state
          pytest -m stage_1 tests/

      # STAGE 2: Checkout/Actions (Depends on Stage 1 JSON)
      - name: Run Stage 2 - Checkout
        if: success()
        run: pytest -m stage_2 tests/

      # Optional: Run everything else (Parallel enabled here)
      - name: Run Remaining Tests
        if: success() && inputs.test_filter == ''
        run: |
          pytest -n auto -m "not stage_1 and not stage_2" --dist loadscope tests/

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-execution-results
          path: |
            test-results/
            tests/reports/
            allure-results/
          retention-days: 7