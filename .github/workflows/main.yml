name: Playwright Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      run_parallel:
        description: 'Run test in parallel?'
        required: true
        type: boolean
        default: false
      test_filter:
        description: 'Run specific test (e.g., -m "smoke")'
        required: false
        default: ''
      record_video:
        description: 'Record videos?'
        type: boolean
        default: false

jobs:
  automation-suite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.4'
          cache: 'pip' # Speeds up subsequent runs

      - name: Set up Node.js (for Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Run Pytest
        env:
          # FIX: Opt into Node 24 now to clear deprecation warnings
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          RECORD_VIDEO: ${{ inputs.record_video || 'false' }}
          LIST_OF_CREDENTIALS: ${{ secrets.LIST_OF_CREDENTIALS }}
          BASE_URL: https://automationexercise.com
        run: |
          # Determine Parallelism
          # If manual input is true OR it's a push (default to parallel on push)
          if [[ "${{ inputs.run_parallel }}" == "true" || "${{ github.event_name }}" == "push" ]]; then
            PARALLEL_ARGS="-n auto"
          else
            PARALLEL_ARGS=""
          fi

          # Execution call
          # We use --dist loadscope to keep BDD scenarios together during parallel runs
          pytest $PARALLEL_ARGS ${{ inputs.test_filter }} --dist loadscope tests/

      - name: Generate Allure HTML report
        if: always()
        run: |
          npx allure generate allure-results -o allure-report --clean

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-execution-results
          path: |
            test-results/
            tests/reports/
            allure-results/
            allure-report/
          retention-days: 7
